Suppressor:
  Item:
    Type: FEATHER
    Custom_Model_Data: -1002
    Name: "<yellow>Suppressor"
    Lore:
      - "<gray>Adds a noise suppressor to the end of the barrel"
      - ""
      - "<gray>Attaches to:"
      - "<blue> M4A4"
      - ""
      - "<dark_gray>Drag and click on a weapon to attach"
  Attach_Mechanics:
    - "Sound{sound=block.anvil.use, volume=0.8, pitch=1.28, noise=0.05}"
  Detach_Mechanics:
    - "Sound{sound=block.chain.place, pitch=0.5, noise=0.05}"
  Denying:
    Weapon_Whitelist: true
    Weapons:
      - M4A1
    Mechanics:
      - "Sound{sound=entity.villager.no, pitch=1.9, listeners=Source{}}"
      - "Title{title=<red>Denied, subtitle=<gray>Only 1 can be attached to M4A1}"
  Modifiers:
    Shoot_Modifier:
      Replace_Mechanics:
        - "CustomSound{sound=shoot.m4a1.silenced.loud, volume=2, noise=0.1}"

