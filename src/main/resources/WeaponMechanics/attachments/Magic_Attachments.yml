Lens_Makers_Glasses:
  Maximum_Stack_Amount: 10 # 100% chance max
  Item:
    Type: PRISMARINE_SHARD
    Name: "<yellow>Lens Maker's Glasses"
    Lore:
      - "<gray>Adds a 10% chance to cause a critical hit with guns,"
      - "<gray>adding an additional heart of damage."
      - ""
      - "<gray>Attaches to:"
      - "<blue> Tactical Helmet"
      - ""
      - "<dark_gray>Drag and click on an armor to attach"
  Attach_Mechanics:
    - "Sound{sound=BLOCK_ENCHANTMENT_TABLE_USE, pitch=1.8, noise=0.05}"
  Detach_Mechanics:
    - "Sound{sound=BLOCK_CHAIN_PLACE, pitch=0.5, noise=0.05}"
  Denying:
    Armor_Whitelist: true
    Armors:
      - Tactical_Helmet
    Mechanics:
      - "Sound{sound=ENTITY_VILLAGER_NO, pitch=1.9, listeners=Source{}}"
  Modifiers:
    Damage_Modifier:
      Critical_Hit:
        Chance: ADD 0.10  # 10% chance to critical hit
        Damage: SET 1.00  # 1 heart of damage