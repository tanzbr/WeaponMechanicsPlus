
#
# These "magical themed" attachments are more for demonstration or example then
# for use on your server. Look here for cool examples
#

Slow_Falling_Bullets:
  Item:
    Type: PHANTOM_MEMBRANE
    Name: "<yellow>Slow-Falling Bullets"
    Lore:
      - "<gray>Bullets shot from this weapon fall slower"
      - ""
      - "<gray>Attaches to:"
      - "<blue> All Guns"
      - ""
      - "<dark_gray>Drag and click on a weapon to attach"
  Attach_Mechanics:
    - "Sound{sound=BLOCK_ENCHANTMENT_TABLE_USE, pitch=1.8, noise=0.05}"
  Detach_Mechanics:
    - "Sound{sound=BLOCK_CHAIN_PLACE, pitch=0.5, noise=0.05}"
  Denying:
    Weapon_Whitelist: false
    Weapons:
      - Combat_Knife
    Mechanics:
      - "Sound{sound=ENTITY_WARDEN_LISTENING_ANGRY, pitch=1.9, listeners=Source{}}"
  Modifiers:
    Projectile_Modifier:
      Gravity: MULTIPLY 0.60  # 60% gravity

