Long_Barrel:
  Item:
    Type: IRON_INGOT
    Name: "<yellow>Long Barrel"
    Lore:
      - "<gray>Increases the speed of projectiles by 10%"
      - ""
      - "<gray>Attaches to:"
      - "<blue> AX-50"
      - ""
      - "<dark_gray>Drag and click on a weapon to attach"
  Attach_Mechanics:
    - "Sound{sound=BLOCK_ANVIL_USE, volume=0.8, pitch=1.28, noise=0.05}"
  Detach_Mechanics:
    - "Sound{sound=BLOCK_CHAIN_PLACE, pitch=0.5, noise=0.05}"
  Denying:
    Weapon_Whitelist: true
    Weapons:
      - AX_50
    Mechanics:
      - "Sound{sound=ENTITY_VILLAGER_NO, pitch=1.9, listeners=Source{}}"
      - "Title{title=<red>Denied, subtitle=<gray>Only 1 can be attached to AX-50}"
  Modifiers:
    Damage_Modifier:
      Projectile_Speed: MULTIPLY 1.10  # 10% more speed

High_Caliber_Rounds:
  Item:
    Type: IRON_NUGGET
    Name: "<yellow>High-Caliber Rounds"
    Lore:
      - "<gray>Increases the damage of this weapon by 20%,"
      - "<gray>but also increases the reload duration by 30%"
      - ""
      - "<gray>Attaches to:"
      - "<blue> All Guns"
      - ""
      - "<dark_gray>Drag and click on a weapon to attach"
  Attach_Mechanics:
    - "Sound{sound=BLOCK_ANVIL_USE, volume=0.8, pitch=1.28, noise=0.05}"
  Detach_Mechanics:
    - "Sound{sound=BLOCK_CHAIN_PLACE, pitch=0.5, noise=0.05}"
  Denying:
    Weapon_Whitelist: false
    Weapons:
      - Combat_Knife
    Mechanics:
      - "Sound{sound=ENTITY_VILLAGER_NO, pitch=1.9, listeners=Source{}}"
  Modifiers:
    Damage_Modifier:
      Damage: MULTIPLY 1.20
    Reload_Modifier:
      Reload_Duration: MULTIPLY 1.30