Attachment:
  Priority: <priority> # e.g. used with when there is set sounds used
  Maximum_Stack_Amount: <amount>
  Item: <ItemSerializer>
  Denying_Attachments:
    Whitelist: <true/false>
    Attachments:
      - <attachment>
      - <etc.>
  Unlockable: # these are for permanent unlocks
    Item: <ItemSerializer>
    Experience: <cost>
    Stats:
      - <WeaponStat>-<amount>
      - <etc.>
  Modifiers: <AttachmentModifier>
  Per_Weapon_Modifiers: # any option used here will override the base modifiers attributes
    <WeaponTitle>: <AttachmentModifier>
    <etc>: <AttachmentModifier>